name: kintiga-evidence-assistant

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kintiga}
      POSTGRES_USER: ${POSTGRES_USER:-kintiga}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kintiga_dev_password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-development}
      AUTH_MODE: ${AUTH_MODE:-jwt}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required. Copy .env.example to .env and set a strong value.}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-admin@example.com}
      CORS_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-kintiga}:${POSTGRES_PASSWORD:-kintiga_dev_password}@postgres:5432/${POSTGRES_DB:-kintiga}
      LOCAL_STORAGE_DIR: /app/data/uploads
      CHROMA_PERSIST_DIR: /app/data/chroma
      EMBEDDING_PROVIDER: mock
      LLM_PROVIDER: mock
      RETRIEVAL_MIN_SIMILARITY: "0.0"
      CHROMA_COLLECTION_NAME: market_access_chunks
    volumes:
      - backend-mock-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready', timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres-data:
  backend-mock-data:
