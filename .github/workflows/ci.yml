name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend-lint:
    name: Backend lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run ruff
        working-directory: backend
        run: python -m ruff check app tests ../scripts

  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: kintiga_ci
          POSTGRES_USER: kintiga
          POSTGRES_PASSWORD: kintiga_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kintiga -d kintiga_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        working-directory: backend
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://kintiga:kintiga_ci_password@localhost:5432/kintiga_ci
        run: python -m pytest tests/unit tests/integration -q

  backend-postgres-smoke:
    name: Backend Postgres smoke
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: kintiga_ci
          POSTGRES_USER: kintiga
          POSTGRES_PASSWORD: kintiga_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kintiga -d kintiga_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Start app against Postgres
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://kintiga:kintiga_ci_password@localhost:5432/kintiga_ci
          AUTH_MODE: disabled
          EMBEDDING_PROVIDER: mock
          LLM_PROVIDER: mock
          CHROMA_PERSIST_DIR: ../.tmp-ci-chroma
          LOCAL_STORAGE_DIR: ../.tmp-ci-uploads
        run: |
          python - <<'PY'
          import asyncio

          from sqlalchemy import text

          from app.core.config import Settings
          from app.main import create_app


          async def main() -> None:
              app = create_app(Settings())
              async with app.router.lifespan_context(app):
                  session_factory = app.state.session_factory
                  async with session_factory() as session:
                      await session.execute(text("select 1"))
                  app.state.chroma_collection.count()


          asyncio.run(main())
          PY

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Test frontend
        working-directory: frontend
        run: npm run test

      - name: Build frontend
        working-directory: frontend
        run: npm run build
